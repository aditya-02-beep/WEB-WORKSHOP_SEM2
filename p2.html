<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern-2</title>
</head>
<body>
    <script>
  for(let i=1;i<=5;i++)
{
    let row="";

   
    for(let j=1;j<=5-i;j++)
    {
        row+=" ";
    }

    
    for(let k=1;k<=i;k++)
    {
        row+="*";
    }

    console.log(row);
}
    </script>
</body>
</html>
